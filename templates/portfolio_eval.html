<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="基金组合评估 — 智能分析与调仓">
<meta property="og:description" content="上传你的基金持仓截图，获取专业分析、历史回测与调仓建议。">
<meta property="og:type" content="website">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<title>基金组合评估</title>
<script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0F172A;color:#F8FAFC;line-height:1.5;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:32px 16px}
.nav-top{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.nav-top a{color:#94A3B8;text-decoration:none;font-size:13px}
.nav-top a:hover{color:#F8FAFC}
.logo{font-size:18px;font-weight:600;color:#F59E0B}
.subtitle{font-size:13px;color:#94A3B8;margin-bottom:24px}
.card{background:rgba(30,41,59,0.95);border:1px solid rgba(148,163,184,0.15);border-radius:12px;padding:24px;margin-bottom:16px}
h2{font-size:17px;margin-bottom:8px}
h3{font-size:15px;margin-bottom:12px;color:#CBD5E1}
.section-badge{font-size:11px;background:rgba(245,158,11,0.15);color:#F59E0B;padding:2px 8px;border-radius:4px;margin-bottom:12px;display:inline-block}
.risk-low{background:rgba(16,185,129,0.15);color:#10B981}
.risk-medium{background:rgba(245,158,11,0.15);color:#F59E0B}
.risk-high{background:rgba(239,68,68,0.15);color:#EF4444}
.upload-area{border:2px dashed rgba(148,163,184,0.3);border-radius:12px;padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-area:hover{border-color:#F59E0B;background:rgba(245,158,11,0.05)}
.upload-area.dragover{border-color:#F59E0B;background:rgba(245,158,11,0.08)}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-text{font-size:14px;color:#94A3B8}
.upload-btn{display:inline-block;background:#F59E0B;color:#0F172A;border:none;border-radius:6px;padding:10px 20px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;margin-top:12px}
.upload-btn:hover{background:#FBBF24}
#imageInput{display:none}
.preview-img{max-width:100%;max-height:240px;border-radius:8px;margin-top:12px}
.manual-toggle{font-size:12px;color:#64748B;text-align:center;margin-top:12px;cursor:pointer}
.manual-toggle:hover{color:#94A3B8}
.manual-section{margin-top:16px;display:none}
.manual-section.active{display:block}
.input-row{display:flex;gap:12px;margin-bottom:12px;align-items:flex-end}
.input-row input{flex:1;background:rgba(15,23,42,0.8);border:1px solid rgba(148,163,184,0.2);border-radius:6px;color:#F8FAFC;padding:10px 12px;font-size:14px;font-family:inherit}
.input-row input::placeholder{color:#64748B}
.remove-btn{background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:10px 14px;cursor:pointer;font-size:14px}
.add-btn{width:100%;background:rgba(148,163,184,0.08);color:#94A3B8;border:1px dashed rgba(148,163,184,0.3);border-radius:6px;padding:10px;cursor:pointer;font-family:inherit;font-size:13px;margin-top:8px}
.add-btn:hover{border-color:rgba(245,158,11,0.3);color:#F59E0B;background:rgba(245,158,11,0.05)}
.fund-card{background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.1);border-radius:8px;padding:16px;margin-bottom:8px}
.fund-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.fund-name{font-weight:600}
.fund-code{font-size:12px;color:#64748B}
.fund-weight{font-size:16px;font-weight:700;color:#F59E0B}
.fund-metrics{display:flex;gap:16px;font-size:13px;margin-top:8px}
.fund-metrics .m{text-align:center}
.fund-metrics .mv{font-weight:600}
.positive{color:#EF4444}.negative{color:#10B981}
.type-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;margin-left:6px;vertical-align:middle}
.type-股票型,.type-指数型{background:rgba(239,68,68,0.15);color:#EF4444}
.type-混合型{background:rgba(245,158,11,0.15);color:#F59E0B}
.type-债券型,.type-货币型{background:rgba(16,185,129,0.15);color:#10B981}
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
.metric-card{background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.1);border-radius:8px;padding:14px;text-align:center}
.metric-value{font-size:22px;font-weight:700;color:#F59E0B;margin-bottom:2px}
.metric-label{font-size:11px;color:#94A3B8}
.chart-wrap{margin-top:12px;border-radius:8px;overflow:hidden}
#backtestChart{width:100%;height:360px}
.recommendation-card{background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.1);border-radius:8px;padding:16px;margin-bottom:8px}
.rec-priority{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;margin-bottom:8px}
.rec-high{background:rgba(239,68,68,0.15);color:#EF4444}
.rec-medium{background:rgba(245,158,11,0.15);color:#F59E0B}
.rec-low{background:rgba(148,163,184,0.15);color:#94A3B8}
.rec-title{font-weight:600;margin-bottom:6px}
.rec-content{font-size:13px;color:#94A3B8;margin-bottom:8px}
.rec-impact{font-size:12px;color:#64748B;background:rgba(15,23,42,0.4);padding:8px;border-radius:6px}
.period-selector{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.period-btn{font-size:13px;background:rgba(148,163,184,0.08);color:#94A3B8;border:1px solid rgba(148,163,184,0.15);border-radius:6px;padding:8px 12px;cursor:pointer;font-family:inherit}
.period-btn:hover{color:#F8FAFC;border-color:rgba(148,163,184,0.3);background:rgba(148,163,184,0.12)}
.period-btn.active{background:rgba(245,158,11,0.15);color:#F59E0B;border-color:rgba(245,158,11,0.35);font-weight:600}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(148,163,184,0.2);border-top-color:#F59E0B;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{text-align:center;padding:40px 16px;color:#94A3B8}
.empty-state{text-align:center;padding:40px 24px;color:#94A3B8}
.empty-state .icon{font-size:36px;margin-bottom:8px}
.error-state{text-align:center;padding:40px 24px;color:#94A3B8}
.error-state button{background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3);border-radius:6px;padding:8px 20px;margin-top:12px;font-size:13px;cursor:pointer;font-family:inherit}
.action-row{display:flex;gap:12px;margin-top:16px}
.primary-btn{flex:1;background:#F59E0B;color:#0F172A;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.primary-btn:hover{background:#FBBF24}
.primary-btn:disabled{opacity:0.5;cursor:not-allowed}
.secondary-btn{flex:1;background:rgba(148,163,184,0.1);color:#F8FAFC;border:1px solid rgba(148,163,184,0.2);border-radius:8px;padding:12px;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.secondary-btn:hover{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)}
.tabs{display:flex;border-bottom:1px solid rgba(148,163,184,0.1);margin-bottom:16px}
.tab{padding:10px 16px;font-size:13px;color:#94A3B8;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:#F8FAFC}
.tab.active{color:#F59E0B;border-bottom-color:#F59E0B}
.tab-content{display:none}
.tab-content.active{display:block}
.help-text{font-size:12px;color:#64748B;margin-top:8px;padding:10px;background:rgba(148,163,184,0.05);border-radius:6px}
.risk-disclaimer{text-align:center;color:#64748B;font-size:11px;padding:24px 16px;line-height:1.8;max-width:560px;margin:0 auto}
.risk-disclaimer p:first-child{color:#EF4444;font-weight:600;margin-bottom:4px}
.two-col{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
.sector-item{display:flex;justify-content:space-between;padding:10px;background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.1);border-radius:6px;font-size:13px}
.sector-name{color:#CBD5E1}
.sector-weight{font-weight:600;color:#F59E0B}
</style>
</head>
<body>
<div class="container">
    <div class="nav-top">
        <a href="/">← 返回主页</a>
        <span style="color:#64748B;font-size:12px;">|</span>
        <span class="logo">基金组合评估</span>
    </div>
    <div class="subtitle">上传持仓截图或手动输入，获取专业分析与调仓建议</div>

    <div class="card" id="uploadCard">
        <span class="section-badge">步骤 1/3</span>
        <h2>输入你的持仓</h2>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">
                <p>上传你的基金持仓截图（天天基金、支付宝等）</p>
                <p style="font-size:12px;margin-top:6px;">支持 JPG、PNG 格式</p>
            </div>
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">选择图片</button>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div id="previewContainer" style="display:none;">
            <img id="previewImg" class="preview-img">
            <div style="text-align:center;margin-top:8px;">
                <button class="secondary-btn" onclick="clearImage()">重新上传</button>
                <button class="primary-btn" onclick="extractFromImage()" id="extractBtn" style="margin-left:8px;">识别基金</button>
            </div>
        </div>
        <div class="manual-toggle" onclick="toggleManual()">或手动输入基金代码和占比 ▼</div>

        <div class="manual-section" id="manualSection">
            <div id="fundInputs">
                <div class="input-row">
                    <input type="text" placeholder="基金代码（如：161725）" data-field="code" maxlength="6">
                    <input type="number" placeholder="占比（%）" data-field="weight" min="1" max="100">
                    <button class="remove-btn" onclick="removeRow(this)">×</button>
                </div>
            </div>
            <button class="add-btn" onclick="addFundRow()">+ 添加基金</button>
            <div class="action-row">
                <button class="secondary-btn" onclick="loadDemo()">载入示例组合</button>
                <button class="primary-btn" onclick="analyzePortfolio()" id="analyzeBtn">分析组合</button>
            </div>
        </div>
    </div>

    <div class="card" id="extractedCard" style="display:none;">
        <span class="section-badge">已识别</span>
        <h2>确认持仓</h2>
        <div id="extractedList"></div>
        <div class="help-text" id="extractNote"></div>
        <div class="action-row">
            <button class="secondary-btn" onclick="resetToUpload()">重新上传</button>
            <button class="primary-btn" onclick="analyzePortfolio()">开始分析</button>
        </div>
    </div>

    <div id="resultsArea" style="display:none;">
        <div class="card">
            <span class="section-badge">步骤 2/3</span>
            <h2>组合概览</h2>
            <div class="metrics-grid" id="metricsGrid"></div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('holdings')">持仓明细</div>
                <div class="tab" onclick="switchTab('style')">风格分析</div>
                <div class="tab" onclick="switchTab('sectors')">行业分布</div>
            </div>
            <div class="tab-content active" id="tab-holdings"></div>
            <div class="tab-content" id="tab-style"></div>
            <div class="tab-content" id="tab-sectors"></div>
        </div>

        <div class="card">
            <span class="section-badge">步骤 3/3</span>
            <h2>历史回测</h2>
            <div class="period-selector" id="periodSelector">
                <button class="period-btn active" data-period="1" onclick="runBacktest(1)">近 1 年</button>
                <button class="period-btn" data-period="2" onclick="runBacktest(2)">近 2 年</button>
                <button class="period-btn" data-period="3" onclick="runBacktest(3)">近 3 年</button>
            </div>
            <div id="backtestWrap">
                <div class="chart-wrap"><div id="backtestChart"></div></div>
                <div class="metrics-grid" id="backtestMetrics"></div>
            </div>
        </div>

        <div class="card" id="recommendationsCard">
            <span class="section-badge">优化建议</span>
            <h2>调仓建议</h2>
            <div id="recommendationsList"></div>
            <div class="help-text" id="expectedEffect" style="margin-top:12px;"></div>
        </div>

        <div class="action-row" style="margin-top:8px;">
            <button class="secondary-btn" onclick="resetAll()">重新开始</button>
        </div>
    </div>

    <div class="risk-disclaimer">
        <p>⚠️ 投资风险提示</p>
        <p>本系统基于公开数据进行分析，仅供参考，不构成投资建议。基金投资有风险，过往业绩不代表未来表现。请在充分了解风险后，根据自身情况独立决策。系统开发者不对任何投资损失承担责任。</p>
    </div>
</div>

<script>
var _extractedHoldings = [];
var _confirmedHoldings = [];
var _analysisResult = null;

function esc(s) {
    var d = document.createElement('div');
    d.textContent = (s != null ? String(s) : '');
    return d.innerHTML;
}

var uploadArea = document.getElementById('uploadArea');
var imageInput = document.getElementById('imageInput');

uploadArea.addEventListener('click', function() { imageInput.click(); });
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); var f = e.dataTransfer.files[0]; if(f) handleFile(f); });

imageInput.addEventListener('change', function(e) { var f = e.target.files[0]; if(f) handleFile(f); });

function handleFile(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('uploadArea').style.display = 'none';
        document.getElementById('previewContainer').style.display = '';
    };
    reader.readAsDataURL(file);
}

function clearImage() {
    document.getElementById('previewImg').src = '';
    document.getElementById('uploadArea').style.display = '';
    document.getElementById('previewContainer').style.display = 'none';
    document.getElementById('imageInput').value = '';
}

function toggleManual() {
    var sec = document.getElementById('manualSection');
    sec.classList.toggle('active');
}

function addFundRow() {
    var container = document.getElementById('fundInputs');
    var div = document.createElement('div');
    div.className = 'input-row';
    div.innerHTML = '<input type="text" placeholder="基金代码（如：161725）" data-field="code" maxlength="6"><input type="number" placeholder="占比（%）" data-field="weight" min="1" max="100"><button class="remove-btn" onclick="removeRow(this)">×</button>';
    container.appendChild(div);
}

function removeRow(btn) {
    var rows = document.querySelectorAll('#fundInputs .input-row');
    if (rows.length > 1) btn.parentElement.remove();
}

function loadDemo() {
    _confirmedHoldings = [
        {fund_code:'161725',fund_name:'招商中证白酒指数',weight:30},
        {fund_code:'005918',fund_name:'易方达蓝筹精选混合',weight:25},
        {fund_code:'163406',fund_name:'兴全合润混合',weight:25},
        {fund_code:'519674',fund_name:'银河创新成长混合',weight:20}
    ];
    showExtractedList();
    document.getElementById('extractedCard').style.display = '';
    document.getElementById('uploadCard').style.display = 'none';
}

function collectManualInputs() {
    var inputs = document.querySelectorAll('#fundInputs .input-row');
    var holdings = [];
    inputs.forEach(function(row) {
        var code = row.querySelector('[data-field="code"]').value.trim();
        var weight = parseFloat(row.querySelector('[data-field="weight"]').value.trim());
        if (code && code.length >= 6 && weight > 0) {
            holdings.push({fund_code:code, weight:weight});
        }
    });
    return holdings;
}

function normalizeWeights(holdings) {
    var total = holdings.reduce(function(sum,h){return sum+(h.weight||0)},0);
    if (total <=0) return holdings;
    holdings.forEach(function(h){h.weight=Math.round((h.weight/total)*100*10)/10;});
    var newTotal = holdings.reduce(function(sum,h){return sum+h.weight},0);
    if (newTotal !=100) holdings[0].weight+= (100-newTotal);
    return holdings;
}

function extractFromImage() {
    var btn = document.getElementById('extractBtn');
    btn.disabled=true;btn.textContent='识别中...';

    var imgSrc = document.getElementById('previewImg').src;
    if (!imgSrc) {btn.disabled=false;btn.textContent='识别基金';return;}

    fetch('/api/portfolio-eval/upload-image', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:imgSrc})
    })
    .then(function(r){return r.json();})
    .then(function(d){
        btn.disabled=false;btn.textContent='识别基金';
        if(!d.success){
            alert(d.error || '识别失败，请手动输入');
            return;
        }
        _extractedHoldings = d.holdings || [];
        _confirmedHoldings = normalizeWeights(_extractedHoldings.slice());
        document.getElementById('extractNote').textContent = d.extraction_notes || '';
        showExtractedList();
        document.getElementById('extractedCard').style.display='';
        document.getElementById('uploadCard').style.display='none';
    })
    .catch(function(){
        btn.disabled=false;btn.textContent='识别基金';
        loadDemo();
    });
}

function showExtractedList() {
    var container = document.getElementById('extractedList');
    var html = '';
    _confirmedHoldings.forEach(function(h,idx){
        html += '<div class="fund-card">' +
            '<div class="fund-header">' +
                '<div>' +
                    '<span class="fund-name">' + esc(h.fund_name || h.fund_code) + '</span>' +
                    '<div class="fund-code">' + esc(h.fund_code) + '</div>' +
                '</div>' +
                '<div><input type="number" value="' + h.weight + '" min="1" max="100" style="width:70px;background:rgba(15,23,42,0.8);border:1px solid rgba(148,163,184,0.2);border-radius:6px;color:#F8FAFC;padding:8px;text-align:right;font-family:inherit;font-weight:700;color:#F59E0B" onchange="updateWeight(' + idx + ',this.value)">%</div>' +
            '</div>' +
        '</div>';
    });
    container.innerHTML = html;
}

function updateWeight(idx, val) {
    _confirmedHoldings[idx].weight = parseFloat(val) || 0;
    _confirmedHoldings = normalizeWeights(_confirmedHoldings);
    showExtractedList();
}

function resetToUpload() {
    document.getElementById('extractedCard').style.display='none';
    document.getElementById('uploadCard').style.display='';
    clearImage();
    document.getElementById('resultsArea').style.display='none';
}

function analyzePortfolio() {
    var holdings = _confirmedHoldings.length ? _confirmedHoldings : collectManualInputs();
    if (!holdings.length){alert('请至少输入一只基金');return;}
    holdings = normalizeWeights(holdings);
    _confirmedHoldings = holdings;

    document.getElementById('resultsArea').style.display='';
    document.getElementById('extractedCard').style.display='none';
    document.getElementById('uploadCard').style.display='none';
    document.getElementById('tab-holdings').innerHTML='<div class="loading-state"><div class="spinner"></div><p style="margin-top:12px;">分析中...</p></div>';

    fetch('/api/portfolio-eval/analyze', {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({holdings:holdings})
    })
    .then(function(r){return r.json();})
    .then(function(d){
        if(!d.success){
            document.getElementById('tab-holdings').innerHTML='<div class="error-state"><p>' + esc(d.error) + '</p><button onclick="resetToUpload()">重试</button></div>';
            return;
        }
        _analysisResult = d;
        renderAnalysis(d);
        runBacktest(1);
    })
    .catch(function(){
        document.getElementById('tab-holdings').innerHTML='<div class="error-state"><p>请求失败，请检查网络</p><button onclick="analyzePortfolio()">重试</button></div>';
    });
}

function renderAnalysis(d) {
    var mhtml = '<div class="metric-card"><div class="metric-value">' + d.metrics.annual_return.toFixed(1) + '%</div><div class="metric-label">预期年化收益</div></div>' +
        '<div class="metric-card"><div class="metric-value">' + d.metrics.conservative_max_drawdown.toFixed(1) + '%</div><div class="metric-label">预估最大回撤</div></div>' +
        '<div class="metric-card"><div class="metric-value">' + d.metrics.sharpe_ratio.toFixed(2) + '</div><div class="metric-label">组合夏普比率</div></div>' +
        '<div class="metric-card"><div class="metric-value">' + d.metrics.fund_count + '</div><div class="metric-label">持有基金数</div></div>';
    document.getElementById('metricsGrid').innerHTML=mhtml;

    var hhtml='';
    d.holdings.forEach(function(h){
        var info=h.info||{};
        var ft=info['基金风格']||'';
        var ar=String(info['年化收益率']||'0%').replace('%','');
        var md=String(info['最大回撤']||'0%').replace('%','');
        hhtml+='<div class="fund-card">' +
            '<div class="fund-header">' +
                '<div>' +
                    '<span class="fund-name">' + esc(h.fund_name) + '</span>' +
                    '<div class="fund-code">' + esc(h.fund_code) + '</div>' +
                '</div>' +
                '<div class="fund-weight">' + h.weight.toFixed(1) + '%</div>' +
            '</div>' +
            '<div class="fund-metrics">' +
                '<div class="m"><div class="mv ' + (parseFloat(ar)>=0?'positive':'negative') + '">' + esc(info['年化收益率']||'') + '</div><div style="font-size:11px;color:#94A3B8">年化</div></div>' +
                '<div class="m"><div class="mv" style="color:#10B981">' + esc(info['最大回撤']||'') + '</div><div style="font-size:11px;color:#94A3B8">回撤</div></div>' +
                '<div class="m"><div class="mv">' + esc(info['夏普比率']||'') + '</div><div style="font-size:11px;color:#94A3B8">夏普</div></div>' +
            '</div>' +
        '</div>';
    });
    document.getElementById('tab-holdings').innerHTML=hhtml;

    var shtml='<div class="two-col">';
    d.style.breakdown.forEach(function(b){
        shtml+='<div class="sector-item"><span class="sector-name">' + esc(b.style) + '</span><span class="sector-weight">' + b.weight.toFixed(1) + '%</span></div>';
    });
    shtml+='</div><div class="help-text">' + (d.style.is_diversified?'风格较为多元，能适应不同市场环境':'风格相对集中，注意单一风格风险') + '</div>';
    document.getElementById('tab-style').innerHTML=shtml;

    var sechtml='<div class="two-col">';
    d.sectors.breakdown.slice(0,6).forEach(function(b){
        sechtml+='<div class="sector-item"><span class="sector-name">' + esc(b.sector) + '</span><span class="sector-weight">' + b.exposure.toFixed(1) + '%</span></div>';
    });
    sechtml+='</div><div class="help-text">行业集中度：' + d.sectors.concentration + '（前三大行业合计 ' + d.sectors.concentration_value.toFixed(0) + '%）</div>';
    document.getElementById('tab-sectors').innerHTML=sechtml;

    var rhtml='';
    var recs = d.recommendations.list || [];
    recs.forEach(function(r){
        var pclass='rec-'+r.priority;
        rhtml+='<div class="recommendation-card">' +
            '<span class="rec-priority ' + pclass + '">' + (r.priority==='high'?'高优先级':r.priority==='medium'?'中优先级':'建议') + '</span>' +
            '<div class="rec-title">' + esc(r.title) + '</div>' +
            '<div class="rec-content">' + esc(r.content) + '</div>' +
            (r.impact?'<div class="rec-impact">' + esc(r.impact) + '</div>':'') +
        '</div>';
    });
    if(!recs.length)rhtml='<div class="empty-state"><div class="icon">✨</div><p>当前组合配置良好</p></div>';
    document.getElementById('recommendationsList').innerHTML=rhtml;
    document.getElementById('expectedEffect').innerHTML='<strong>预期效果：</strong>' + esc(d.recommendations.summary || '') + '<br><br>' + esc(d.recommendations.expected_effect?.improvement_note || '');
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
    event.target.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
}

function runBacktest(years) {
    document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active');if(parseInt(b.dataset.period)===years)b.classList.add('active');});
    document.getElementById('backtestChart').innerHTML='<div class="loading-state"><div class="spinner" style="margin-top:60px;"></div><p style="margin-top:12px;">回测中...</p></div>';

    fetch('/api/portfolio-eval/backtest', {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({holdings:_confirmedHoldings,years:years})
    })
    .then(function(r){return r.json();})
    .then(function(d){
        if(!d.success){
            document.getElementById('backtestChart').innerHTML='<div class="error-state"><p>' + esc(d.error) + '</p></div>';
            return;
        }
        renderBacktestChart(d);
        var bmhtml='<div class="metric-card"><div class="metric-value">' + d.total_return.toFixed(2) + '%</div><div class="metric-label">累计收益</div></div>' +
            '<div class="metric-card"><div class="metric-value">' + d.annualized_return.toFixed(2) + '%</div><div class="metric-label">年化</div></div>' +
            '<div class="metric-card"><div class="metric-value">' + d.max_drawdown.toFixed(2) + '%</div><div class="metric-label">最大回撤</div></div>' +
            '<div class="metric-card"><div class="metric-value">' + d.sharpe_ratio.toFixed(2) + '</div><div class="metric-label">夏普比率</div></div>';
        document.getElementById('backtestMetrics').innerHTML=bmhtml;
    })
    .catch(function(){
        document.getElementById('backtestChart').innerHTML='<div class="error-state"><p>回测失败</p></div>';
    });
}

function renderBacktestChart(d) {
    var dates = d.dates || [];
    var navs = d.navs || [];
    var trace = {
        x:dates, y:navs, mode:'lines', name:'组合净值',
        line:{color:'#F59E0B',width:2}, fill:'tozeroy', fillcolor:'rgba(245,158,11,0.1)'
    };
    var layout = {
        margin:{l:40,r:20,t:30,b:40}, paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
        font:{family:'-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',color:'#94A3B8',size:11},
        xaxis:{gridcolor:'rgba(148,163,184,0.1)',linecolor:'rgba(148,163,184,0.2)'},
        yaxis:{gridcolor:'rgba(148,163,184,0.1)',linecolor:'rgba(148,163,184,0.2)'},
        showlegend:false, height:360
    };
    Plotly.newPlot('backtestChart',[trace],layout,{responsive:true,displayModeBar:false});
}

function resetAll() {
    _extractedHoldings=[];
    _confirmedHoldings=[];
    _analysisResult=null;
    document.getElementById('resultsArea').style.display='none';
    document.getElementById('uploadCard').style.display='';
    document.getElementById('extractedCard').style.display='none';
    clearImage();
}
</script>
